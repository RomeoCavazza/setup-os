# ==============================================================================
# HYPRLAND MAIN CONFIGURATION
# ==============================================================================

monitor = ,preferred,auto,1.25

# ------------------------------------------------------------------------------
# PLUGIN LOAD (chemin stable via home-manager)
# ------------------------------------------------------------------------------
plugin = $HOME/.local/lib/libhypr-darkwindow.so
plugin = $HOME/.local/lib/hypr-canvas.so
# plugin = $HOME/.local/lib/hyprexpo.so
plugin = $HOME/.local/lib/hyprspace.so


# --- THEME INCLUDES ---
source = $HOME/.config/hypr/theme/seaglass.conf
source = $HOME/.config/hypr/theme/hyprchroma.conf
source = $HOME/.config/hypr/theme/rules.conf

# ==============================================================================
# AUTOSTART
# ==============================================================================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY

exec-once = sh -lc 'pkill waybar; (waybar </dev/null >/dev/null 2>&1 & disown)'

exec-once = systemctl --user restart hypridle.service

# ==============================================================================
# ENV
# ==============================================================================
env = LIBSEAT_BACKEND,logind

# Official Hyprland Logo Cursor (Teal/Cyan drop)
env = XCURSOR_THEME,Hyprland-Logo
env = XCURSOR_SIZE,24

env = HYPRCURSOR_THEME,Hyprland-Logo
env = HYPRCURSOR_SIZE,24

cursor {
  enable_hyprcursor = true
}

env = NIXOS_OZONE_WL,1
env = MOZ_ENABLE_WAYLAND,1
env = SDL_VIDEODRIVER,wayland

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = ELECTRON_ENABLE_WAYLAND,1

# ==============================================================================
# APPS
# ==============================================================================
$terminal    = foot
$fileManager = nemo
$menu        = $HOME/.config/rofi/scripts/rofi-push.sh
$powermenu   = $HOME/.config/rofi/scripts/rofi-push.sh

# ==============================================================================
# LAYOUT / MISC
# ==============================================================================
general {
  layout = dwindle
  resize_on_border = true
}

dwindle {
  pseudotile = true
  preserve_split = true
}

misc {
  force_default_wallpaper = 2
  disable_hyprland_logo = false
}

# ==============================================================================
# INPUT
# ==============================================================================
input {
  kb_layout = fr
  kb_options = ctrl:nocaps
  follow_mouse = 1
  natural_scroll = yes

  touchpad {
    natural_scroll = yes
  }
}

# ==============================================================================
# BINDS
# ==============================================================================
$mod = SUPER

bind  = $mod, Return,      exec, $terminal
bind  = $mod, Tab,         exec, $fileManager
bind  = $mod, Space,       exec, $powermenu
bind  = $mod, twosuperior, exec, $HOME/.config/rofi/bin/rofi-grid.sh
bind = $mod, C, exec, /etc/nixos/config/bin/edex-conky-toggle
bind = $mod, E, exec, /etc/nixos/config/bin/edex-toggle
# bindr = $mod, O, exec, $HOME/.local/bin/dw-toggle-global

bind = $mod, Q, killactive
bind = $mod, BackSpace, exec, $HOME/.local/bin/hypr-close-all
bind = $mod, F, togglefloating
bind = $mod, V, fullscreen, 0
bind = $mod, W, layoutmsg, togglesplit
bind = $mod, less, layoutmsg, togglesplit

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod CTRL, left,  moveactive, -50 0
bind = $mod CTRL, right, moveactive, 50 0
bind = $mod CTRL, up,    moveactive, 0 -50
bind = $mod CTRL, down,  moveactive, 0 50

bind = $mod SHIFT, left,  swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up,    swapwindow, u
bind = $mod SHIFT, down,  swapwindow, d

bind = $mod ALT, left,  resizeactive, -30 0
bind = $mod ALT, right, resizeactive, 30 0
bind = $mod ALT, up,    resizeactive, 0 -30
bind = $mod ALT, down,  resizeactive, 0 30

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, ampersand,  workspace, 1
bind = $mod, eacute,     workspace, 2
bind = $mod, quotedbl,   workspace, 3
bind = $mod, apostrophe, workspace, 4
bind = $mod, parenleft,  workspace, 5

bind = $mod SHIFT, ampersand,  movetoworkspace, 1
bind = $mod SHIFT, eacute,     movetoworkspace, 2
bind = $mod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mod SHIFT, apostrophe, movetoworkspace, 4
bind = $mod SHIFT, parenleft,  movetoworkspace, 5

# Lock screen
bind = $mod, L, exec, hyprlock

# Brightness keys (hardware can expose XF86, code:* or F5/F6)
bind = , XF86MonBrightnessDown, exec, brightnessctl -d intel_backlight set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl -d intel_backlight set +5%
bind = , code:232, exec, brightnessctl -d intel_backlight set 5%-
bind = , code:233, exec, brightnessctl -d intel_backlight set +5%
bind = , F5, exec, brightnessctl -d intel_backlight set 5%-
bind = , F6, exec, brightnessctl -d intel_backlight set +5%

# Audio/media keys (hardware can expose XF86 keys or F1/F2/F3/F4)
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 10%+
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = , F3, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 10%+
bindl = , F4, exec, playerctl play-pause

# Hyprspace (Surgical Edition) - Powerful Overview
bind = $mod, D, exec, /etc/nixos/config/bin/hypr-overview-toggle

plugin {
  overview {
    panelColor = rgba(1e1e2eef)
    workspaceActiveBackground = rgba(0d141b61)
    workspaceInactiveBackground = rgba(0d141b47)
    workspaceActiveBorder = rgba(94e2d5ff)
    workspaceInactiveBorder = rgba(b7bcc638)
    workspaceBorderSize = 2
    drawActiveWorkspace = true
    showNewWorkspace = false
    overrideGaps = false
    # Unified cyan colors.
    workspaceActiveColor = rgba(94e2d5ff)
    
    # Advanced behavior
    autoScroll = true
    exitOnClick = true
    switchOnDrop = true
    exitOnSwitch = true
    autoDrag = true
  }
}

# Layout toggle (Simple, decoupled)
bind = $mod, Z, exec, $HOME/.local/bin/hypr-layout-toggle
bind = $mod, B, exec, $HOME/.local/bin/waybar-toggle
bind = $mod, M, exec, /etc/nixos/config/bin/cursor-toggle
bind = $mod, R, canvas:reset,
bind = $mod ALT SHIFT, left,  canvas:pan, left
bind = $mod ALT SHIFT, right, canvas:pan, right
bind = $mod ALT SHIFT, up,    canvas:pan, up
bind = $mod ALT SHIFT, down,  canvas:pan, down
bind = $mod, minus,           canvas:zoom, out
bind = $mod, equal,           canvas:zoom, in

# Screenshots
bind = , Print, exec, sh -lc 'mkdir -p "$HOME/Images" && grim "$HOME/Images/Screenshot-$(date +%Y-%m-%d_%H-%M-%S).png" && notify-send "Screenshot saved"'
bind = $mod, Print, exec, sh -lc 'mkdir -p "$HOME/Images" && grim -g "$(slurp)" "$HOME/Images/Screenshot-$(date +%Y-%m-%d_%H-%M-%S).png" && notify-send "Screenshot saved"'
bind = $mod SHIFT, S, exec, sh -lc 'mkdir -p "$HOME/Images" && grim -g "$(slurp)" "$HOME/Images/Screenshot-$(date +%Y-%m-%d_%H-%M-%S).png" && notify-send "Screenshot saved"'

xwayland {
  force_zero_scaling = true
}

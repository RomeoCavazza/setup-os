# Hyprlock configuration
# Reference: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height
    dots_spacing = 0.15 # Scale of dots_size
    dots_center = false
    outer_color = rgb(94, 226, 213)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(255, 255, 255)
    placeholder_text = Input Password...
    font_family = JetBrains Mono
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    fade_in_duration = 200
    fade_out_duration = 300
    placement = center
    # Keep the password field below center. Use % for scale-independent spacing.
    position = 0, -8%
    halign = center
    valign = center
    shadow_passes = 5
    shadow_boost = 1.2
}

label {
    monitor =
    text = cmd[update:1000] echo -n "$(date +'%H:%M:%S')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 56
    font_family = JetBrains Mono
    # Main clock above the date with a tighter gap.
    position = 0, 8%
    halign = center
    valign = center
    shadow_passes = 5
    shadow_boost = 1.2
}

label {
    monitor =
    text = cmd[update:18000] echo -n "$(date +'%A, %d %B %Y')"
    color = rgba(255, 255, 255, 0.82)
    font_size = 20
    font_family = JetBrains Mono
    # Date between clock and input, 10% below clock and 10% above input.
    position = 0, 2%
    halign = center
    valign = center
    shadow_passes = 3
    shadow_boost = 1.0
}

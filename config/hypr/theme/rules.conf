# Window rules restored from the last known good compact eDEX/conky setup.

# Float & size
windowrule = float on, match:class ^(pavucontrol|blueman-manager)$
windowrule = size 900 650, match:class ^(pavucontrol)$

# Steam
windowrule = animation off, match:class ^(steam)$

# Terminals (slight translucency)
windowrule = opacity 0.96 0.92, match:class ^(foot|kitty|Alacritty)$

# Browsers / IDE glass
windowrule = opacity 0.93 0.88, match:class ^(firefox|google-chrome|brave-browser|chromium)$
windowrule = opacity 0.93 0.88, match:class ^(code|cursor|antigravity)$

# Nautilus
windowrule = opacity 0.93 0.88, match:class ^(org\\.gnome\\.Nautilus|nautilus)$

# eDEX-UI
windowrule = animation off, match:class ^(eDEX-UI|edex-ui)$

# Conky rail
windowrule = float on, match:class ^(Conky|ConkyRail)$
windowrule = border_color rgba(00000000), match:class ^(Conky|ConkyRail)$
windowrule = stay_focused off, match:class ^(Conky|ConkyRail)$
windowrule = animation off, match:class ^(Conky|ConkyRail)$
windowrule = opacity 1.0 1.0, match:class ^(Conky|ConkyRail)$
windowrule = move 16 52, match:class ^(ConkyRail)$

windowrule {
    name = conky-rail-effects
    match:class = ^(Conky|ConkyRail)$

    no_blur = true
    no_shadow = true
    rounding = 0
}

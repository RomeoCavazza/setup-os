# /etc/nixos/config/hypr/theme/rules.conf

# Float & size
windowrule = float on, match:class ^(pavucontrol|blueman-manager)$
windowrule = size 900 650, match:class ^(pavucontrol)$

# Steam
windowrule = animation off, match:class ^(steam)$

# Terminals (slight translucency)
windowrule = opacity 0.96 0.92, match:class ^(foot|kitty|Alacritty)$

# Browsers / IDE glass
windowrule = opacity 0.93 0.88, match:class ^(firefox|google-chrome|brave-browser|chromium)$
windowrule = opacity 0.93 0.88, match:class ^(code|cursor|antigravity)$

# Nautilus
windowrule = opacity 0.93 0.88, match:class ^(org\.gnome\.Nautilus|nautilus)$

# eDEX-UI: no anim
windowrule = animation off, match:class ^(eDEX-UI|edex-ui)$

# Conky panels: float, no border, no focus, no anim, full opacity (all conky classes)
windowrule = float on,              match:class ^(Conky|ConkySystem|ConkyNetwork)$
windowrule = border_color rgba(00000000), match:class ^(Conky|ConkySystem|ConkyNetwork)$
windowrule = stay_focused off,      match:class ^(Conky|ConkySystem|ConkyNetwork)$
windowrule = animation off,         match:class ^(Conky|ConkySystem|ConkyNetwork)$
windowrule = opacity 1.0 1.0,       match:class ^(Conky|ConkySystem|ConkyNetwork)$

# --- Pin + stretch full height (logical) ---
#windowrule = size 288 1192, match:class ^(ConkySystem)$
windowrule = move -5 44,    match:class ^(ConkySystem)$

#windowrule = size 288 1192, match:class ^(ConkyNetwork)$
windowrule = move 1766 44,  match:class ^(ConkyNetwork)$

# Conky FULL rules (enable when needed)
# source = /etc/nixos/config/hypr/theme/rules.conky-full.conf

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Hyprland Cachix
        uses: cachix/cachix-action@v14
        with:
          name: hyprland

      - name: Build
        run: nix build -L

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp result/lib/libhyprchroma.so libhyprchroma.so
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }} — Hyprland v0.54.2 port" \
            --notes-file RELEASE_NOTES.md \
            libhyprchroma.so

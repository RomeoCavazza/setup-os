name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Hyprland Cachix
        uses: cachix/cachix-action@v14
        with:
          name: hyprland

      - name: Format check
        run: nix run .#fmt-check

      - name: Dead code check
        run: nix run .#deadnix

      - name: Static lint
        run: nix run .#statix

      - name: Grafana dashboard check
        run: nix run .#grafana-check

      - name: Build declared checks
        run: |
          nix build \
            "git+file://$PWD#checks.x86_64-linux.fmt" \
            "git+file://$PWD#checks.x86_64-linux.deadnix" \
            "git+file://$PWD#checks.x86_64-linux.statix" \
            "git+file://$PWD#checks.x86_64-linux.grafana" \
            --no-link

      # Reports pinned flake inputs vs upstream. The lock file remains the source
      # of truth; this surfaces lagging pins without making intentional lag noisy.
      - name: Dependency pin audit
        run: nix run .#repo-audit
